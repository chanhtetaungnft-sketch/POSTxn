<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e2a38,#3a4b63);
    color: white;
    display: flex;
    justify-content: center;
    padding-top: 40px;
}

/* Container */
.container {
    width: 750px;
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* Search */
#searchBox {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    outline: none;
}

/* Results */
#results {
    margin-top: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    max-height: 250px;
    overflow-y: auto;
}

.item {
    padding: 12px;
    cursor: pointer;
}

.item:hover,
.active {
    background: rgba(255,255,255,0.2);
}

/* Detail Card */
#detail {
    margin-top: 20px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    display: none;
}

/* KPI */
.kpi {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.box {
    flex: 1;
    text-align: center;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
}

/* Badge */
.badge {
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
}

.activeBadge {
    background: #00c853;
}

.inactiveBadge {
    background: #ff5252;
}

/* Table */
table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Chart */
canvas {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 POS Pro Dashboard</h1>

<input type="text" id="searchBox" placeholder="Search HQ ID or Store Name">
<div id="results"></div>

<div id="detail"></div>

<canvas id="chart" height="120"></canvas>

</div>

<script>
let sheetData = [];
let chart;

const API_URL = "https://script.google.com/macros/s/AKfycbxbSkVguaanvqWG8KZlgQ67slnSNGvR79Fls-HsoLecmdEGOVICx7zGljL2Z0uXLweO/exec";

// Fetch
fetch(API_URL)
.then(res => res.json())
.then(data => sheetData = data);

// Detect months
function getMonths(item){
    return Object.keys(item)
        .filter(k => k.includes("Count"))
        .map(k => k.replace(" Count",""));
}

// Search
const searchBox = document.getElementById("searchBox");
const results = document.getElementById("results");
const detail = document.getElementById("detail");

searchBox.addEventListener("input", function(){

    let keyword = this.value.toLowerCase();
    results.innerHTML = "";
    detail.style.display = "none";

    if(!keyword) return;

    let filtered = sheetData.filter(item =>
        (item["HQ ID"]+"").toLowerCase().includes(keyword) ||
        (item["Store Name"]+"").toLowerCase().includes(keyword)
    );

    filtered.slice(0,10).forEach(item => {

        let div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<b>${item["Store Name"]}</b> (HQ: ${item["HQ ID"]})`;

        div.onclick = () => showDetail(item);

        results.appendChild(div);
    });
});

// Show Detail
function showDetail(item){

    let months = getMonths(item);

    let totalCount = 0;
    let totalVol = 0;

    let rows = "";
    let volumes = [];
    let counts = [];

    months.forEach(m => {

        let c = Number(item[m+" Count"] || 0);
        let v = Number(item[m+" Volume"] || 0);

        totalCount += c;
        totalVol += v;

        volumes.push(v);
        counts.push(c);

        rows += `
        <tr>
            <td>${m}</td>
            <td>${c}</td>
            <td>${v.toLocaleString()}</td>
        </tr>`;
    });

    // Status badge
    let status = (item["Portal Status"] || "").toLowerCase();
    let badge = status === "active" ? 
        `<span class="badge activeBadge">Active</span>` :
        `<span class="badge inactiveBadge">Inactive</span>`;

    detail.style.display = "block";

    detail.innerHTML = `
    <h2>${item["Store Name"]}</h2>
    <p>HQ ID: ${item["HQ ID"]} ${badge}</p>

    <div class="kpi">
        <div class="box">
            <h3>${totalCount}</h3>
            <p>Total Count</p>
        </div>
        <div class="box">
            <h3>${totalVol.toLocaleString()}</h3>
            <p>Total Volume</p>
        </div>
    </div>

    <table>
        <tr><th>Month</th><th>Count</th><th>Volume</th></tr>
        ${rows}
    </table>
    `;

    // Chart
    let ctx = document.getElementById("chart").getContext("2d");

    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:'line',
        data:{
            labels: months,
            datasets:[
                {
                    label:"Volume",
                    data: volumes,
                    borderWidth:2
                },
                {
                    label:"Count",
                    data: counts,
                    borderWidth:2
                }
            ]
        }
    });
}
</script>

</body>
</html>

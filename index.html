<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMQR Txn Monitoring</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #fff;
    padding: 30px;
    color: #000;
}

/* Title */
h1 {
    text-align: center;
    font-size: 32px;
}

/* Search */
#searchBox {
    display: block;
    margin: 20px auto;
    padding: 15px;
    width: 420px;
    border-radius: 15px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* Suggestion Box */
#suggestionBox {
    width: 420px;
    margin: auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    max-height: 200px;
    overflow-y: auto;
}

.suggestion {
    padding: 10px;
    cursor: pointer;
}
.suggestion:hover {
    background: #f0f0f0;
}

/* Cards */
.merchant-card, .card {
    background: rgba(0,0,0,0.05);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
}

.kpi-container {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.kpi {
    flex: 1;
    text-align: center;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.05);
}

.txn-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 8px;
}
</style>
</head>

<body>

<h1>MMQR Txn Monitoring</h1>

<input type="text" id="searchBox" placeholder="🔍 Search HQ ID or Store Name">
<div id="suggestionBox"></div>

<div id="merchantInfo"></div>
<div id="kpi"></div>
<div class="txn-grid" id="txnData"></div>

<script>
let sheetData = [];

const API_URL = "https://script.google.com/macros/s/AKfycbw1kfCUXcC-MiJtVw0y9gp6mYKUAMUJ-LFRmhhfddbJ8c8rGWUaQZYnFwNEmzqvbSLc/exec";

// Load data
fetch(API_URL)
.then(res => res.json())
.then(data => sheetData = data);

// format
function formatNumber(num){
    return Number(num || 0).toLocaleString();
}

// search input
const searchBox = document.getElementById("searchBox");
const suggestionBox = document.getElementById("suggestionBox");

searchBox.addEventListener("keyup", function(){
    const keyword = this.value.toLowerCase();

    suggestionBox.innerHTML = "";
    if(keyword.length < 1) return;

    let filtered = sheetData.filter(item =>
        (item["HQ ID"] || "").toLowerCase().includes(keyword) ||
        (item["Store Name"] || "").toLowerCase().includes(keyword)
    );

    filtered.slice(0,10).forEach(item=>{
        const div = document.createElement("div");
        div.className = "suggestion";
        div.innerText = item["Store Name"] + " (" + item["HQ ID"] + ")";
        
        div.onclick = ()=>{
            searchBox.value = item["Store Name"];
            suggestionBox.innerHTML = "";
            showResult(item);
        };

        suggestionBox.appendChild(div);
    });
});

// show result
function showResult(item){

const merchantDiv = document.getElementById("merchantInfo");
const txnDiv = document.getElementById("txnData");
const kpiDiv = document.getElementById("kpi");

// merchant info
merchantDiv.innerHTML = `
<div class="merchant-card">
    <h2>${item["Store Name"]}</h2>
    <p>HQ ID: ${item["HQ ID"]}</p>
    <p>Store ID: ${item["Store ID"]}</p>
    <p>Terminal ID: ${item["Terminal ID"]}</p>
    <p>Status: ${item["Status"]}</p>
    <p>Deploy Date: ${item["Deployed by Date"]}</p>
</div>`;

// KPI
let totalCount =
    Number(item["Jan Count"]||0)+
    Number(item["Feb Count"]||0)+
    Number(item["March Count"]||0);

let totalVol =
    Number(item["Jan Volume"]||0)+
    Number(item["Feb Volume"]||0)+
    Number(item["March Volume"]||0);

kpiDiv.innerHTML = `
<div class="kpi-container">
    <div class="kpi">
        <p>Total Count</p>
        <h2>${formatNumber(totalCount)}</h2>
    </div>
    <div class="kpi">
        <p>Total Volume</p>
        <h2>${formatNumber(totalVol)}</h2>
    </div>
</div>`;

// table
txnDiv.innerHTML = `
<div class="card">
<h3>Txn Summary</h3>
<table>
<tr><th>Month</th><th>Count</th><th>Volume</th></tr>

<tr>
<td>Jan</td>
<td>${formatNumber(item["Jan Count"])}</td>
<td>${formatNumber(item["Jan Volume"])}</td>
</tr>

<tr>
<td>Feb</td>
<td>${formatNumber(item["Feb Count"])}</td>
<td>${formatNumber(item["Feb Volume"])}</td>
</tr>

<tr>
<td>March</td>
<td>${formatNumber(item["March Count"])}</td>
<td>${formatNumber(item["March Volume"])}</td>
</tr>

</table>
</div>`;
}
</script>

</body>
</html>

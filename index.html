<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Enterprise Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#1e2a38;
    color:white;
    display:flex;
}

/* Sidebar */
.sidebar {
    width:220px;
    background:#16202c;
    height:100vh;
    padding:20px;
}

.sidebar h2 {
    text-align:center;
}

.menu {
    margin-top:30px;
}

.menu div {
    padding:12px;
    margin:5px 0;
    cursor:pointer;
    border-radius:10px;
}

.menu div:hover,
.activeMenu {
    background:#2c3e50;
}

/* Main */
.main {
    flex:1;
    padding:30px;
}

/* Page */
.page {
    display:none;
}

.activePage {
    display:block;
}

/* Search */
#searchBox {
    width:100%;
    padding:12px;
    border-radius:20px;
    border:none;
}

/* Results */
#results {
    background:#2c3e50;
    margin-top:10px;
    border-radius:10px;
    max-height:200px;
    overflow-y:auto;
}

.item {
    padding:10px;
    cursor:pointer;
}

.item:hover {
    background:#34495e;
}

/* Card */
.card {
    margin-top:20px;
    background:#2c3e50;
    padding:20px;
    border-radius:15px;
}

/* KPI */
.kpi {
    display:flex;
    gap:10px;
}

.box {
    flex:1;
    background:#34495e;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

/* Table */
table {
    width:100%;
    margin-top:15px;
    border-collapse: collapse;
}

td,th {
    padding:8px;
    text-align:center;
    border-bottom:1px solid #444;
}

/* Chart */
canvas {
    margin-top:20px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🏦 POS</h2>

    <div class="menu">
        <div class="activeMenu" onclick="showPage('searchPage', this)">🔍 Search</div>
        <div onclick="showPage('dashboardPage', this)">📊 Dashboard</div>
    </div>
</div>

<!-- Main -->
<div class="main">

<!-- SEARCH PAGE -->
<div id="searchPage" class="page activePage">

<h2>Search Merchant</h2>

<input type="text" id="searchBox" placeholder="Search HQ ID or Store Name">
<div id="results"></div>

<div id="detail"></div>

<canvas id="chart"></canvas>

</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="page">

<h2>📊 Overall Dashboard</h2>

<div class="kpi">
    <div class="box">
        <h3 id="totalCount">0</h3>
        <p>Total Count</p>
    </div>
    <div class="box">
        <h3 id="totalVolume">0</h3>
        <p>Total Volume</p>
    </div>
</div>

<canvas id="overallChart"></canvas>

</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxbSkVguaanvqWG8KZlgQ67slnSNGvR79Fls-HsoLecmdEGOVICx7zGljL2Z0uXLweO/exec";

let sheetData = [];
let chart, overallChart;

// Load data
fetch(API_URL)
.then(res=>res.json())
.then(data=>{
    sheetData = data;
    loadDashboard();
});

// Page switch
function showPage(pageId, el){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
    document.getElementById(pageId).classList.add("activePage");

    document.querySelectorAll(".menu div").forEach(m=>m.classList.remove("activeMenu"));
    el.classList.add("activeMenu");
}

// Detect months
function getMonths(item){
    return Object.keys(item)
        .filter(k=>k.includes("Count"))
        .map(k=>k.replace(" Count",""));
}

// SEARCH
searchBox.addEventListener("input", function(){

    let keyword = this.value.toLowerCase();
    results.innerHTML = "";

    if(!keyword) return;

    let filtered = sheetData.filter(item =>
        (item["HQ ID"]+"").toLowerCase().includes(keyword) ||
        (item["Store Name"]+"").toLowerCase().includes(keyword)
    );

    filtered.slice(0,10).forEach(item=>{
        let div = document.createElement("div");
        div.className="item";
        div.innerHTML=`${item["Store Name"]} (HQ:${item["HQ ID"]})`;

        div.onclick=()=>showDetail(item);

        results.appendChild(div);
    });
});

// DETAIL
function showDetail(item){

    let months = getMonths(item);

    let totalCount=0, totalVol=0;
    let volumes=[];

    let rows="";

    months.forEach(m=>{
        let c=Number(item[m+" Count"]||0);
        let v=Number(item[m+" Volume"]||0);

        totalCount+=c;
        totalVol+=v;
        volumes.push(v);

        rows+=`<tr><td>${m}</td><td>${c}</td><td>${v.toLocaleString()}</td></tr>`;
    });

    detail.innerHTML=`
    <div class="card">
        <h3>${item["Store Name"]}</h3>
        <p>HQ: ${item["HQ ID"]}</p>

        <div class="kpi">
            <div class="box"><h3>${totalCount}</h3><p>Count</p></div>
            <div class="box"><h3>${totalVol.toLocaleString()}</h3><p>Volume</p></div>
        </div>

        <table>
        <tr><th>Month</th><th>Count</th><th>Volume</th></tr>
        ${rows}
        </table>
    </div>
    `;

    let ctx=document.getElementById("chart").getContext("2d");
    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:'bar',
        data:{
            labels:months,
            datasets:[{label:"Volume", data:volumes}]
        }
    });
}

// DASHBOARD
function loadDashboard(){

    let totalCount=0, totalVol=0;
    let monthMap={};

    sheetData.forEach(item=>{
        let months=getMonths(item);

        months.forEach(m=>{
            let c=Number(item[m+" Count"]||0);
            let v=Number(item[m+" Volume"]||0);

            totalCount+=c;
            totalVol+=v;

            if(!monthMap[m]) monthMap[m]=0;
            monthMap[m]+=v;
        });
    });

    document.getElementById("totalCount").innerText=totalCount;
    document.getElementById("totalVolume").innerText=totalVol.toLocaleString();

    let ctx=document.getElementById("overallChart").getContext("2d");

    overallChart=new Chart(ctx,{
        type:'line',
        data:{
            labels:Object.keys(monthMap),
            datasets:[{
                label:"Total Volume",
                data:Object.values(monthMap)
            }]
        }
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Transaction Monitoring</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#e3ecf7,#f5f7fa);
    display: flex;
    justify-content: center;
    padding-top: 60px;
}

/* Container */
.container {
    width: 650px;
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* Search */
#searchBox {
    width: 100%;
    padding: 15px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    outline: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Results */
#results {
    margin-top: 10px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    max-height: 300px;
    overflow-y: auto;
}

/* Item */
.item {
    padding: 12px 15px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.item:hover,
.active {
    background: #eef3ff;
}

/* Highlight */
mark {
    background: yellow;
}

/* Detail Panel */
#detail {
    margin-top: 20px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(15px);
    display: none;
}

.label {
    color: gray;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔍 POS Transaction Monitoring</h1>

<input type="text" id="searchBox" placeholder="Search HQ ID or Store Name...">
<div id="results"></div>

<div id="detail"></div>

</div>

<script>
let sheetData = [];
let currentIndex = -1;

const API_URL = "https://script.google.com/macros/s/AKfycbwq_1e2XQMzJxB7aldgptnX1_gRfVD2RYFhCxVOmInuF4uFdEwWf5h6lay7CgM6dTzu/exec";

// Fetch data
fetch(API_URL)
.then(res => res.json())
.then(data => sheetData = data);

// Elements
const searchBox = document.getElementById("searchBox");
const results = document.getElementById("results");
const detail = document.getElementById("detail");

// Highlight function
function highlight(text, keyword){
    if(!keyword) return text;
    let regex = new RegExp(`(${keyword})`, "gi");
    return text.replace(regex, "<mark>$1</mark>");
}

// Show detail
function showDetail(item){
    detail.style.display = "block";

    detail.innerHTML = `
        <h2>${item["Merchant Name"]}</h2>
        <p><span class="label">HQ ID:</span> ${item["HQ ID"]}</p>
        <p><span class="label">Setup Date:</span> ${item["Setup By Date"] || "-"}</p>
        <hr>
        <p><b>January:</b> ${item["Jan Count"] || 0} | ${Number(item["Jan Volume"]||0).toLocaleString()}</p>
        <p><b>February:</b> ${item["Feb Count"] || 0} | ${Number(item["Feb Volume"]||0).toLocaleString()}</p>
        <p><b>March:</b> ${item["March Count"] || 0} | ${Number(item["March Volume"]||0).toLocaleString()}</p>
        <p><b>April:</b> ${item["April Count"] || 0} | ${Number(item["April Volume"]||0).toLocaleString()}</p>
    `;
}

// Search
searchBox.addEventListener("input", function(){

    let keyword = this.value.toLowerCase().trim();
    results.innerHTML = "";
    detail.style.display = "none";
    currentIndex = -1;

    if(!keyword) return;

    let filtered = sheetData.filter(item =>
        (item["HQ ID"]+"").toLowerCase().includes(keyword) ||
        (item["Merchant Name"]+"").toLowerCase().includes(keyword)
    );

    filtered.slice(0,20).forEach((item, index)=>{
        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            ${highlight(item["Merchant Name"], keyword)}<br>
            <small>HQ ID: ${highlight(item["HQ ID"]+"", keyword)}</small>
        `;

        div.onclick = ()=>{
            showDetail(item);
            results.innerHTML = "";
        };

        results.appendChild(div);
    });

});

// Keyboard control
searchBox.addEventListener("keydown", function(e){
    let items = document.querySelectorAll(".item");

    if(e.key === "ArrowDown"){
        currentIndex++;
    }
    else if(e.key === "ArrowUp"){
        currentIndex--;
    }
    else if(e.key === "Enter"){
        if(items[currentIndex]){
            items[currentIndex].click();
        }
    }

    items.forEach(i => i.classList.remove("active"));

    if(items[currentIndex]){
        items[currentIndex].classList.add("active");
    }
});
</script>

</body>
</html>
